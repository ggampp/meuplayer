<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MeuPlayer · Rede Buzz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,144,400;1,144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link rel="stylesheet" href="/tokens.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <script src="/nav.js"></script>
    <main class="workbench" id="rede-buzz">
      <aside class="workbench__sidebar">
        <header class="workbench__header">
          <p class="workbench__eyebrow">Workbench · TV</p>
          <div class="workbench__header-row">
            <h1 class="workbench__title">Rede Buzz</h1>
            <button
              type="button"
              id="toggleFavoriteBtn"
              class="workbench__fav-current"
              hidden
              aria-pressed="false"
              title="Adicionar aos favoritos"
            >
              ☆
            </button>
          </div>
        </header>
        <p class="workbench__status" id="channelsStatus">Carregando canais...</p>
        <div class="workbench__filters">
          <label class="workbench__field">
            Buscar
            <input
              type="search"
              id="channelSearch"
              placeholder="Nome do canal..."
              autocomplete="off"
            />
          </label>
          <label class="workbench__field">
            Categoria
            <select id="channelCategory">
              <option value="">Todas</option>
            </select>
          </label>
          <label class="workbench__field workbench__field--mobile-channel">
            Canal
            <select id="channelMobileSelect">
              <option value="">Carregando...</option>
            </select>
          </label>
        </div>
        <div
          class="workbench__list"
          id="channelsGrid"
          role="listbox"
          aria-label="Lista de canais Rede Buzz"
        ></div>
      </aside>
      <section class="workbench__player" aria-label="Player do canal">
        <iframe
          id="player"
          title="Player Rede Buzz"
          allow="autoplay *; encrypted-media *; picture-in-picture *; fullscreen *; clipboard-write *; accelerometer *; gyroscope *"
          allowfullscreen
          webkitallowfullscreen
          mozallowfullscreen
        ></iframe>
      </section>
      <div class="player-overlay" id="playerOverlay" aria-label="Controles do canal">
        <button type="button" id="channelUp" title="Canal anterior" aria-label="Canal anterior">↑</button>
        <button type="button" id="channelDown" title="Próximo canal" aria-label="Próximo canal">↓</button>
      </div>
    </main>

    <script src="/rede-buzz-store.js"></script>
    <script src="/rede-buzz-ui.js"></script>
    <script>
      MeuPlayerRedeBuzzUI.init({ mode: "all" });
    </script>
  </body>
</html>
